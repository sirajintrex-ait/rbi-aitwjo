<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBI Navigation Bar</title>
  <style>
    /* Global canvas setup */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #e0e0e0; /* Matches the gray background */
      padding-top: 10px;
    }

    /* 1. Brand Top Bar */
    .brand-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 15px 10px 15px;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .brand-title {
      color: #d47519; /* Original orange color */
      font-size: 24px;
      font-weight: bold;
    }

    .btn-file {
      background: #85c1e9;
      color: #333;
      border: 1px solid #70a1c5;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .brand-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: #333;
    }

    .brand-right-text {
      text-align: right;
      line-height: 1.3;
    }

    .weather-box {
      background: #f4f4f4;
      border: 1px solid #bcbcbc;
      border-radius: 8px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    /* 2. Navigation Tab Container */
    .nav-tabs {
      display: flex;
      background-color: #e0e0e0;
      padding: 0 15px;
      gap: 4px;
      border-bottom: 2px solid #d47519; /* Orange bottom dividing line */
    }

    /* Standard Tab styling */
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #cccccc; /* Unselected Tab Gray */
      border: 1px solid #bcbcbc;
      border-bottom: none;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab:hover {
      background: #dcdcdc;
    }

    /* Active Tab Specific Overrides */
    .tab.active {
      background: #fdf6e7; /* Active Cream/Yellow Hue */
      color: #d47519;
      font-weight: bold;
      border-bottom: 1px solid #fdf6e7; /* Blends with container background */
      margin-bottom: -1px; /* Overlaps standard orange border line */
      z-index: 2;
    }

    /* Status Dots */
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-green { background-color: #27ae60; }
    .dot-gray { background-color: #95a5a6; }

    /* 3. Sub-library Bar */
    .library-bar {
      background: #dfdfdf;
      padding: 6px 15px;
      font-size: 12px;
      font-weight: bold;
      color: #333;
      display: flex;
      align-items: center;
      gap: 5px;
      border-bottom: 1px solid #bcbcbc;
    }
  </style>
</head>
<body>

  <div class="brand-bar">
    <div class="brand-left">
      <div class="brand-title">Pressure vessel RBI</div>
      <button class="btn-file">File ▼</button>
    </div>
    
    <div class="brand-right">
      <div class="brand-right-text">
        <span style="font-weight: bold;">OpenStandard_RBI</span><br>
        27 Mar 2026 10:13
      </div>
      <div class="weather-box">⛅</div>
    </div>
  </div>

  <div class="nav-tabs">
    <div class="tab" onclick="switchView('M1')">
      <span class="dot dot-green"></span> M1 Asset
    </div>
    
    <div class="tab active" onclick="switchView('M2')">
      <span class="dot dot-green"></span> M2 Chemistry
    </div>
    
    <div class="tab" onclick="switchView('M3')">
      <span class="dot dot-green"></span> M3 Damage
    </div>
    
    <div class="tab" onclick="switchView('M4')">
      <span class="dot dot-green"></span> M4 Release
    </div>
    
    <div class="tab" onclick="switchView('M5')">
      <span class="dot dot-green"></span> M5 Consequence
    </div>
    
    <div class="tab" onclick="switchView('M6')">
      <span class="dot dot-green"></span> M6 Risk consequences
    </div>
    
    <div class="tab" onclick="switchView('M7')">
      <span class="dot dot-green"></span> M7 Planning
    </div>
    
    <div class="tab" onclick="switchView('M8')">
      <span class="dot dot-green"></span> M8 History
    </div>
    
    <div class="tab" onclick="switchView('M9')">
      <span class="dot dot-green"></span> M9 Report
    </div>
    
    <div class="tab" onclick="switchView('M10')">
      <span class="dot dot-gray"></span> M10 Inspection test plan
    </div>
  </div>

  <div class="library-bar">
    📚 LIBRARIES ▶
  </div>

  <script>
    function switchView(module) {
      alert("Loading view panel for " + module);
      // Your routing logic to switch table visibility goes here!
    }
  </script>

</body>
</html>
