<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBI Navigation Bar</title>
  <style>
    /* Global canvas setup */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #e0e0e0;
      padding-top: 10px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 1. Brand Top Bar */
    .brand-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 15px 10px 15px;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .brand-title {
      color: #d47519;
      font-size: 24px;
      font-weight: bold;
    }

    .btn-file {
      background: #85c1e9;
      color: #333;
      border: 1px solid #70a1c5;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .brand-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: #333;
    }

    .brand-right-text {
      text-align: right;
      line-height: 1.3;
    }

    .weather-box {
      background: #f4f4f4;
      border: 1px solid #bcbcbc;
      border-radius: 8px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    /* 2. Navigation Tab Container */
    .nav-tabs {
      display: flex;
      background-color: #e0e0e0;
      padding: 0 15px;
      gap: 4px;
      border-bottom: 2px solid #d47519;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #cccccc;
      border: 1px solid #bcbcbc;
      border-bottom: none;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
    }

    .tab:hover {
      background: #dcdcdc;
    }

    .tab.active {
      background: #fdf6e7;
      color: #d47519;
      font-weight: bold;
      border-bottom: 1px solid #fdf6e7;
      margin-bottom: -1px;
      z-index: 2;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-green { background-color: #27ae60; }
    .dot-gray { background-color: #95a5a6; }

    /* 3. Sub-library Bar */
    .library-bar {
      background: #dfdfdf;
      padding: 6px 15px;
      font-size: 12px;
      font-weight: bold;
      color: #333;
      display: flex;
      align-items: center;
      gap: 5px;
      border-bottom: 1px solid #bcbcbc;
    }

    /* 4. Dashboard Viewport Container (Loaded internally) */
    .workspace-viewport {
      flex: 1;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>

  <div class="brand-bar">
    <div class="brand-left">
      <div class="brand-title">Pressure vessel RBI</div>
      <button class="btn-file">File ▼</button>
    </div>
    
    <div class="brand-right">
      <div class="brand-right-text">
        <span style="font-weight: bold;">OpenStandard_RBI</span><br>
        27 Mar 2026 15:13
      </div>
      <div class="weather-box">⛅</div>
    </div>
  </div>

  <div class="nav-tabs" id="nav-tabs">
    <a href="m1_asset.html" class="tab active">
      <span class="dot dot-green"></span> M1 Asset
    </a>
    
    <a href="m2_chemistry.html" class="tab">
      <span class="dot dot-green"></span> M2 Chemistry
    </a>
    
    <a href="m3_damage.html" class="tab">
      <span class="dot dot-green"></span> M3 Damage
    </a>
    
    <a href="m4_release.html" class="tab">
      <span class="dot dot-green"></span> M4 Release
    </a>
    
    <a href="m5_consequenceaggregation.html" class="tab">
      <span class="dot dot-green"></span> M5 Consequence
    </a>
    
    <a href="m6_riskconsequencesscoringPosi.html" class="tab">
      <span class="dot dot-green"></span> M6 Risk consequences
    </a>
    
    <a href="m7_planning.html" class="tab">
      <span class="dot dot-green"></span> M7 Planning
    </a>
    
    <a href="m8_history.html" class="tab">
      <span class="dot dot-green"></span> M8 History
    </a>
    
    <a href="m9_report.html" class="tab">
      <span class="dot dot-green"></span> M9 Report
    </a>
    
    <a href="m10_inspectiontestplan.html" class="tab">
      <span class="dot dot-gray"></span> M10 Inspection test plan
    </a>
  </div>

  <div class="library-bar">
    📚 LIBRARIES ▶
  </div>

  <iframe id="viewport" class="workspace-viewport" src="m1_asset.html"></iframe>

  <script src="index.js"></script>
</body>
</html>
